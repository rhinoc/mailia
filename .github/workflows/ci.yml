name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-test:
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v4

      - uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: "26.4"

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: Web/Timeline/package-lock.json

      - name: Install timeline dependencies
        run: npm --prefix Web/Timeline ci

      - name: Build timeline assets
        run: npm --prefix Web/Timeline run build:app

      - name: Swift build
        run: swift build -v

      - name: Swift test
        run: swift test
