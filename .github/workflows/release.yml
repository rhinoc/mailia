name: Release

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-26
    if: ${{ !contains(github.event.head_commit.message, 'chore') }}
    steps:
      - uses: actions/checkout@v4

      - name: Sync Sparkle SUFeedURL with this repo
        run: |
          FEED="https://raw.githubusercontent.com/${{ github.repository }}/main/appcast.xml"
          /usr/libexec/PlistBuddy -c "Set :SUFeedURL ${FEED}" Sources/MailiaApp/Info.plist

      - uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: "26.4"

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: Web/Timeline/package-lock.json

      - name: Install timeline dependencies
        run: npm --prefix Web/Timeline ci

      - name: Import signing certificate
        env:
          BUILD_CERTIFICATE_BASE64: ${{ secrets.BUILD_CERTIFICATE_BASE64 }}
          P12_PASSWORD: ${{ secrets.P12_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: scripts/code_sign.sh

      - name: Bump version
        id: ver
        run: |
          NEW="$(scripts/update_version.sh)"
          echo "version=$NEW" >>"$GITHUB_OUTPUT"

      - name: Build release DMG
        env:
          MAILIA_ALLOW_ADHOC_SIGNING: ${{ secrets.BUILD_CERTIFICATE_BASE64 == '' && '1' || '' }}
        run: scripts/build_release.sh

      - name: Update Sparkle appcast
        env:
          VERSION: ${{ steps.ver.outputs.version }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          SPARKLE_ED_PRIVATE_KEY: ${{ secrets.SPARKLE_ED_PRIVATE_KEY }}
        run: scripts/update_appcast.sh

      - name: Upload GitHub Release
        uses: svenstaro/upload-release-action@v2
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          file: dist/Mailia-${{ steps.ver.outputs.version }}-macos.dmg
          asset_name: Mailia-${{ steps.ver.outputs.version }}-macos.dmg
          tag: v${{ steps.ver.outputs.version }}
          overwrite: true
          body: |
            Open the DMG and drag Mailia.app to Applications.

            If the repository has Developer ID signing secrets configured, this build is signed with that identity. Otherwise it is ad-hoc signed so the automated DMG and Sparkle appcast still publish; macOS may require the first launch to be approved with Control-click -> Open.

      - name: Commit version bump
        run: scripts/commit_release.sh

      - name: Remove CI signing keychain
        if: always()
        run: scripts/reset_code_sign.sh
